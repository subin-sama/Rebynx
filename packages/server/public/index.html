<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebynx</title>
    <style>
      :root {
        --bg: #16181d;
        --panel: #1d2027;
        --panel-2: #23262f;
        --border: #2c3038;
        --text: #d7dae0;
        --muted: #7d828c;
        --accent: #6ea8fe;
        --green: #5bd99e;
        --red: #f2777a;
        --yellow: #e6c07b;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--mono);
        font-size: 12.5px;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      header .title { font-weight: 600; letter-spacing: 0.3px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
      .dot.on { background: var(--green); }
      header .conn { color: var(--muted); display: flex; align-items: center; gap: 6px; }
      header input {
        flex: 1;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 5px 9px;
        font-family: var(--mono);
        outline: none;
      }
      header input:focus { border-color: var(--accent); }
      button {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
        font-family: var(--mono);
      }
      button:hover { border-color: var(--accent); }
      .tabs { display: flex; gap: 2px; padding: 0 8px; background: var(--panel); border-bottom: 1px solid var(--border); }
      .tab {
        padding: 8px 14px;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
      }
      .tab.active { color: var(--text); border-bottom-color: var(--accent); }
      .tab .count { color: var(--muted); font-size: 11px; }
      main { flex: 1; overflow-y: auto; padding: 4px 0; }
      .row {
        padding: 5px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: baseline;
        cursor: default;
      }
      .row:hover { background: var(--panel); }
      .ts { color: var(--muted); flex-shrink: 0; }
      .lvl { flex-shrink: 0; width: 44px; text-transform: uppercase; font-size: 10px; padding-top: 1px; }
      .lvl.error { color: var(--red); }
      .lvl.warn { color: var(--yellow); }
      .lvl.info, .lvl.log, .lvl.debug { color: var(--muted); }
      .msg { white-space: pre-wrap; word-break: break-word; flex: 1; }
      .src { color: var(--accent); cursor: pointer; flex-shrink: 0; font-size: 11px; }
      .src:hover { text-decoration: underline; }
      .method { color: var(--accent); flex-shrink: 0; width: 52px; }
      .status { flex-shrink: 0; width: 38px; }
      .status.ok { color: var(--green); }
      .status.err { color: var(--red); }
      .status.pending { color: var(--yellow); }
      .url { flex: 1; word-break: break-all; }
      .dur { color: var(--muted); flex-shrink: 0; }
      .store-tag { color: var(--accent); flex-shrink: 0; }
      .action-tag { color: var(--yellow); flex-shrink: 0; }
      details { margin: 6px 0 2px; }
      summary { cursor: pointer; color: var(--muted); list-style: none; }
      summary::-webkit-details-marker { display: none; }
      summary::before { content: "▸ "; }
      details[open] summary::before { content: "▾ "; }
      pre {
        margin: 6px 0 0;
        padding: 8px 10px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: #c8cdd6;
      }
      .empty { color: var(--muted); text-align: center; padding: 48px; }
    </style>
  </head>
  <body>
    <header>
      <span class="title">Rebynx</span>
      <span class="conn"><span class="dot" id="dot"></span><span id="conn-text">connecting…</span></span>
      <input id="filter" placeholder="filter…" />
      <button id="clear">Clear</button>
    </header>
    <div class="tabs" id="tabs"></div>
    <main id="main"></main>

    <script>
      const PLUGINS = [
        { id: 'logs', label: 'Logs', accepts: (e) => e.type === 'log' },
        { id: 'network', label: 'Network', accepts: (e) => e.type === 'network' },
        { id: 'state', label: 'State', accepts: (e) => e.type === 'state' },
        { id: 'inspect', label: 'Inspect', accepts: (e) => e.type === 'inspect' },
      ];

      let active = 'logs';
      let filter = '';
      const events = [];
      const netIndex = new Map(); // reqId -> merged request row

      const $ = (id) => document.getElementById(id);
      const time = (ts) => new Date(ts).toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(ts % 1000).padStart(3, '0');
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      const pretty = (v) => esc(JSON.stringify(v, null, 2));

      function srcLink(source) {
        if (!source) return '';
        const i = source.lastIndexOf(':');
        const file = source.slice(0, i);
        const line = source.slice(i + 1);
        return `<span class="src" data-file="${esc(file)}" data-line="${esc(line)}">${esc(source.split('/').pop())}</span>`;
      }

      function ingest(e) {
        if (e.type === 'network') {
          // merge start/end into one row keyed by reqId
          const existing = netIndex.get(e.reqId);
          if (existing) Object.assign(existing, e);
          else { netIndex.set(e.reqId, e); events.push(e); }
        } else {
          events.push(e);
        }
        render();
      }

      function matches(e) {
        if (!filter) return true;
        return JSON.stringify(e).toLowerCase().includes(filter);
      }

      function renderTabs() {
        $('tabs').innerHTML = PLUGINS.map((p) => {
          const n = events.filter((e) => p.accepts(e)).length;
          return `<div class="tab ${p.id === active ? 'active' : ''}" data-tab="${p.id}">${p.label} <span class="count">${n}</span></div>`;
        }).join('');
      }

      function rowLog(e) {
        return `<div class="row">
          <span class="ts">${time(e.ts)}</span>
          <span class="lvl ${e.level}">${e.level}</span>
          <span class="msg">${esc(e.message)}${argsBlock(e.args)}</span>
          ${srcLink(e.source)}
        </div>`;
      }
      function argsBlock(args) {
        if (!args || !args.length || (args.length === 1 && typeof args[0] === 'string')) return '';
        return `<details><summary>args</summary><pre>${pretty(args)}</pre></details>`;
      }

      function rowNet(e) {
        const pending = e.phase !== 'end';
        const statusCls = pending ? 'pending' : e.ok ? 'ok' : 'err';
        const statusTxt = pending ? '···' : e.status;
        return `<div class="row">
          <span class="ts">${time(e.ts)}</span>
          <span class="method">${esc(e.method || '')}</span>
          <span class="status ${statusCls}">${statusTxt}</span>
          <span class="url">${esc(e.url || '')}
            <details><summary>details${e.duration != null ? ' · ' + e.duration + 'ms' : ''}</summary><pre>${pretty({
              request: { headers: e.reqHeaders, body: e.reqBody },
              response: { status: e.status, headers: e.resHeaders, body: e.resBody },
            })}</pre></details>
          </span>
          <span class="dur">${e.duration != null ? e.duration + 'ms' : ''}</span>
        </div>`;
      }

      function rowState(e) {
        return `<div class="row">
          <span class="ts">${time(e.ts)}</span>
          <span class="store-tag">${esc(e.store)}</span>
          ${e.action ? `<span class="action-tag">${esc(e.action)}</span>` : ''}
          <span class="msg"><details><summary>state</summary><pre>${pretty(e.state)}</pre></details></span>
        </div>`;
      }

      function rowInspect(e) {
        return `<div class="row">
          <span class="ts">${time(e.ts)}</span>
          <span class="store-tag">${esc(e.name || 'element')}</span>
          ${srcLink(e.source)}
          <span class="msg"><details><summary>props / style</summary><pre>${pretty({ props: e.props, style: e.style })}</pre></details></span>
        </div>`;
      }

      function render() {
        renderTabs();
        const plugin = PLUGINS.find((p) => p.id === active);
        const list = events.filter((e) => plugin.accepts(e) && matches(e));
        if (!list.length) {
          $('main').innerHTML = `<div class="empty">no ${active} yet</div>`;
          return;
        }
        const renderer = { logs: rowLog, network: rowNet, state: rowState, inspect: rowInspect }[active];
        $('main').innerHTML = list.map(renderer).join('');
      }

      // ---- interactions ----
      $('tabs').addEventListener('click', (ev) => {
        const tab = ev.target.closest('.tab');
        if (tab) { active = tab.dataset.tab; render(); }
      });
      $('filter').addEventListener('input', (ev) => { filter = ev.target.value.toLowerCase(); render(); });
      $('clear').addEventListener('click', () => {
        events.length = 0; netIndex.clear(); render();
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ kind: 'command', command: { type: 'clear' } }));
      });
      $('main').addEventListener('click', (ev) => {
        const s = ev.target.closest('.src');
        if (s) fetch(`/open?file=${encodeURIComponent(s.dataset.file)}&line=${encodeURIComponent(s.dataset.line)}`).catch(() => {});
      });

      // ---- socket with auto-reconnect ----
      let ws;
      function connect() {
        ws = new WebSocket(`ws://${location.host}`);
        ws.onopen = () => {
          $('dot').classList.add('on');
          $('conn-text').textContent = 'connected';
          ws.send(JSON.stringify({ kind: 'hello', role: 'browser' }));
        };
        ws.onmessage = (m) => {
          try {
            const msg = JSON.parse(m.data);
            if (msg.kind === 'event') ingest(msg.event);
          } catch {}
        };
        ws.onclose = () => {
          $('dot').classList.remove('on');
          $('conn-text').textContent = 'reconnecting…';
          setTimeout(connect, 1500);
        };
        ws.onerror = () => ws.close();
      }
      connect();
      render();
    </script>
  </body>
</html>
