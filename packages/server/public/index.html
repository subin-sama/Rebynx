<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebynx</title>
    <link rel="icon" type="image/png" href="/assets/rebynx-icon-256.png" />
    <style>
      :root {
        --bg: #16181d;
        --panel: #1d2027;
        --panel-2: #23262f;
        --border: #2c3038;
        --text: #d7dae0;
        --muted: #7d828c;
        --accent: #6ea8fe;
        --green: #5bd99e;
        --red: #f2777a;
        --yellow: #e6c07b;
        --purple: #c792ea;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--mono);
        font-size: 12.5px;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
      }
      header .title { font-weight: 600; letter-spacing: 0.3px; }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .brand-mark {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        object-fit: cover;
        box-shadow: 0 0 16px rgba(61, 196, 255, 0.22);
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
      .dot.on { background: var(--green); }
      header .conn { color: var(--muted); display: flex; align-items: center; gap: 6px; }
      header input {
        flex: 1;
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 5px 9px;
        font-family: var(--mono);
        outline: none;
      }
      header input:focus { border-color: var(--accent); }
      button {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
        font-family: var(--mono);
      }
      button:hover { border-color: var(--accent); }
      .tabs { display: flex; gap: 2px; padding: 0 8px; background: var(--panel); border-bottom: 1px solid var(--border); }
      .tab {
        padding: 8px 14px;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
      }
      .tab.active { color: var(--text); border-bottom-color: var(--accent); }
      .tab .count { color: var(--muted); font-size: 11px; }
      main { flex: 1; overflow-y: auto; padding: 4px 0; }
      .row {
        padding: 5px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: baseline;
        cursor: default;
      }
      .row:hover { background: var(--panel); }
      .ts { color: var(--muted); flex-shrink: 0; }
      .lvl { flex-shrink: 0; width: 44px; text-transform: uppercase; font-size: 10px; padding-top: 1px; }
      .lvl.error { color: var(--red); }
      .lvl.warn { color: var(--yellow); }
      .lvl.info, .lvl.log, .lvl.debug { color: var(--muted); }
      .msg { white-space: pre-wrap; word-break: break-word; flex: 1; }
      .src { color: var(--accent); cursor: pointer; flex-shrink: 0; font-size: 11px; }
      .src:hover { text-decoration: underline; }
      .method { color: var(--accent); flex-shrink: 0; width: 52px; }
      .status { flex-shrink: 0; width: 38px; }
      .status.ok { color: var(--green); }
      .status.err { color: var(--red); }
      .status.pending { color: var(--yellow); }
      .url { flex: 1; word-break: break-all; min-width: 0; }
      .dur { color: var(--muted); flex-shrink: 0; }
      .store-tag { color: var(--accent); flex-shrink: 0; }
      .action-tag { color: var(--yellow); flex-shrink: 0; }
      details { margin: 6px 0 2px; }
      summary { cursor: pointer; color: var(--muted); list-style: none; }
      summary::-webkit-details-marker { display: none; }
      summary::before { content: "▸ "; }
      details[open] summary::before { content: "▾ "; }
      pre {
        margin: 6px 0 0;
        padding: 8px 10px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: #c8cdd6;
      }
      .empty { color: var(--muted); text-align: center; padding: 48px; }
      .flash { color: var(--green); margin-left: 2px; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
      .flash.on { opacity: 1; }
      .flow-row { cursor: pointer; }
      .flow-name { color: var(--text); font-weight: 600; flex-shrink: 0; }
      .flow-del, .flow-export { padding: 2px 8px; font-size: 11px; }
      .flow-head { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); }
      .flow-back { padding: 3px 8px; }
      .seq { color: var(--muted); flex-shrink: 0; }

      /* Mock server: per-flow / per-call toggles + the live-mock banner */
      .mock-flow, .mock-call { padding: 2px 8px; font-size: 11px; }
      .mock-flow.on, .mock-call.on { border-color: var(--green); color: var(--green); }
      .mock-banner { margin: 8px 12px; padding: 8px 10px; border: 1px solid var(--green); border-radius: 8px; background: var(--panel-2); }
      .mock-banner-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
      .mock-banner-row > span:nth-child(2) { flex: 1; color: var(--green); font-weight: 600; }
      .mock-stop { padding: 2px 12px; font-size: 11px; }
      .mock-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
      .mock-emu { margin-top: 6px; color: var(--muted); font-size: 11px; }
      .mock-emu code { color: var(--text); background: var(--panel); padding: 1px 5px; border-radius: 4px; }
      .mock-eps { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
      .mock-ep { display: flex; align-items: baseline; gap: 8px; }
      .mock-ep .method { width: 42px; flex-shrink: 0; }
      .mock-ep-url { color: var(--text); word-break: break-all; }
      a.mock-ep-url { color: var(--accent); text-decoration: none; }
      a.mock-ep-url:hover { text-decoration: underline; }

      /* Per-call editor (payload / response / status) */
      .edit-call { padding: 2px 8px; font-size: 11px; }
      .call-editor { margin: 8px 0 2px; padding: 10px; border: 1px solid var(--accent); border-radius: 8px; background: var(--panel-2); }
      .edit-field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .edit-status { width: 90px; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font-family: var(--mono); outline: none; }
      .edit-status:focus { border-color: var(--accent); }
      /* Highlighted editor: transparent textarea layered over a coloured <pre>.
         Both share identical geometry so the caret lines up with the colours. */
      .hl-editor { position: relative; height: 160px; margin: 4px 0 8px; }
      .hl-editor .hl-back, .hl-editor textarea {
        position: absolute; inset: 0; margin: 0;
        box-sizing: border-box; padding: 8px 10px;
        border: 1px solid var(--border); border-radius: 6px;
        font-family: var(--mono); font-size: 12px; line-height: 1.5; tab-size: 2;
        white-space: pre; overflow: auto; word-wrap: normal;
      }
      .hl-editor .hl-back { z-index: 0; background: var(--panel); color: #c8cdd6; border-color: transparent; pointer-events: none; }
      .hl-editor textarea { z-index: 1; background: transparent; color: transparent; caret-color: var(--text); resize: none; outline: none; }
      .hl-editor textarea:focus { border-color: var(--accent); }
      .hl-editor textarea::selection { background: rgba(110, 168, 254, 0.35); }
      .edit-error { color: var(--red); font-size: 11px; min-height: 14px; }
      .edit-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
      .edit-save { border-color: var(--green); color: var(--green); }

      /* In-app modal (portable name prompt / confirm — Electron has no window.prompt) */
      .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fade-in 0.12s ease-out; }
      .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; width: min(420px, 90vw); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5); }
      .modal-msg { color: var(--text); margin-bottom: 10px; }
      .modal-input { width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 10px; font-family: var(--mono); font-size: 13px; outline: none; }
      .modal-input:focus { border-color: var(--accent); }
      .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
      .modal-ok { border-color: var(--accent); color: var(--accent); }

      /* JSON viewer: a titled, copyable, syntax-highlighted panel */
      .json-block { margin: 6px 0 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--panel-2); }
      .json-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 6px 4px 10px; background: var(--panel); border-bottom: 1px solid var(--border); }
      .json-label { color: var(--muted); font-size: 11px; }
      .copy-btn { padding: 1px 9px; font-size: 11px; border-radius: 4px; }
      .copy-btn:hover { color: var(--accent); }
      .json-block pre { margin: 0; border: 0; border-radius: 0; background: transparent; max-height: 460px; overflow: auto; }
      .j-key { color: var(--accent); }
      .j-str { color: var(--green); }
      .j-num { color: var(--yellow); }
      .j-bool { color: var(--purple); }
      .j-null { color: var(--muted); }

      /* Connection status pill + Setup tab */
      .app-status { color: var(--muted); font-size: 11px; white-space: nowrap; flex-shrink: 0; }
      .app-status.on { color: var(--green); }
      .setup { padding: 14px 16px; max-width: 760px; }
      .setup-banner { padding: 10px 12px; border-radius: 6px; margin-bottom: 14px; border: 1px solid var(--border); font-weight: 600; }
      .setup-banner.wait { color: var(--yellow); }
      .setup-banner.ok { color: var(--green); border-color: var(--green); }
      .setup-label { color: var(--muted); margin: 14px 0 2px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
      .setup-note { color: var(--muted); margin-top: 16px; line-height: 1.6; }
      .setup-note code { color: var(--text); background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }
      .state-picker { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 2px; }
      .state-opt { padding: 3px 10px; font-size: 11px; border-radius: 6px; }
      .state-opt.active { border-color: var(--accent); color: var(--accent); }
      .state-split { display: flex; height: 100%; }
      .state-left { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); overflow: auto; }
      .state-right { flex: 1; overflow: auto; min-width: 0; }
      .state-item { display: flex; gap: 8px; align-items: baseline; padding: 5px 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
      .state-item:hover { background: var(--panel); }
      .state-item.sel { background: var(--panel); box-shadow: inset 2px 0 0 var(--accent); }
      .state-detail-bar { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border); }
      .state-live, .state-pause { padding: 3px 12px; font-size: 11px; border-radius: 6px; }
      .state-pause.paused { border-color: var(--yellow); color: var(--yellow); }
      .state-current { padding: 4px 10px 12px; }
      .state-diff { margin: 8px 12px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--panel-2); }
      /* Snapshot + payload panels align to the same 12px inset as the diff + tree */
      .state-right .json-block { margin: 8px 12px; }
      .diff-body { padding: 6px 4px; max-height: 240px; overflow: auto; }
      .diff-empty { padding: 8px 10px; color: var(--muted); }
      .diff-row { display: flex; gap: 6px; align-items: baseline; padding: 2px 8px; white-space: pre-wrap; word-break: break-word; }
      .diff-sign { flex-shrink: 0; width: 10px; text-align: center; }
      .diff-path { color: var(--text); flex-shrink: 0; }
      .diff-val { color: var(--muted); }
      .diff-arrow { color: var(--muted); }
      .diff-added .diff-sign, .diff-added .diff-path { color: var(--green); }
      .diff-removed .diff-sign, .diff-removed .diff-path { color: var(--red); }
      .diff-changed .diff-sign, .diff-changed .diff-path { color: var(--yellow); }

      /* Current state as a collapsible, flash-on-change JSON tree */
      .jt-tree { padding: 8px 12px 14px; }
      .jt-row { padding: 1px 2px; white-space: pre-wrap; word-break: break-word; border-radius: 4px; }
      .jt-branch { cursor: pointer; user-select: none; }
      .jt-branch:hover .jt-key { text-decoration: underline; }
      .jt-caret { display: inline-block; width: 12px; color: var(--muted); }
      .jt-caret::before { content: "▾"; }
      .jt-obj.collapsed > .jt-branch .jt-caret::before { content: "▸"; }
      .jt-obj.collapsed > .jt-kids { display: none; }
      .jt-kids { margin-left: 5px; border-left: 1px solid var(--border); padding-left: 10px; }
      .jt-key { color: var(--accent); }
      .jt-punc { color: var(--muted); }
      .jt-leafval { color: #c8cdd6; }
      @keyframes jt-flash { 0% { background: rgba(230, 192, 123, 0.32); } 100% { background: transparent; } }
      .jt-node.flash > .jt-row { animation: jt-flash 1.15s ease-out; }

      /* subtle motion */
      @keyframes fade-in { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
      .state-item { animation: fade-in 0.18s ease-out; }
      .tab { transition: color 0.12s, border-color 0.12s; }
      button { transition: border-color 0.12s, color 0.12s, background 0.12s; }
      .row, .state-item { transition: background 0.1s; }
      .setup-hint { color: var(--muted); margin-top: 8px; font-size: 11px; line-height: 1.5; }
      .setup-hint code { color: var(--text); background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <header>
      <span class="brand">
        <img class="brand-mark" src="/assets/rebynx-icon-256.png" alt="" />
        <span class="title">Rebynx</span>
      </span>
      <span class="conn"><span class="dot" id="dot"></span><span id="conn-text">connecting…</span></span>
      <span class="app-status" id="app-status">○ waiting for app</span>
      <input id="filter" placeholder="filter…" />
      <button id="save-flow">Save flow</button>
      <button id="clear">Clear</button>
      <span class="flash" id="flash"></span>
    </header>
    <div class="tabs" id="tabs"></div>
    <main id="main"></main>

    <script type="module">
      import { createApp } from '/app.js';
      createApp().start();
    </script>
  </body>
</html>
